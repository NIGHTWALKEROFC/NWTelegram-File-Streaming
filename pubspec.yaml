name: telegram_streamer
description: Stream Telegram files without downloading.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Telegram TDLib wrapper
  handy_tdlib: ^2.3.10

  # Video/Audio player (libmpv/FFmpeg — supports HEVC, MKV, TS, FLAC, OPUS …)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.4
  media_kit_libs_android_video: ^1.3.4

  # Audio player (lighter for audio-only files)
  just_audio: ^0.9.36

  # Local HTTP proxy server
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # Secure storage for session
  flutter_secure_storage: ^9.0.0

  # State management
  provider: ^6.1.1

  # HTTP
  http: ^1.2.0

  # URL launcher
  url_launcher: ^6.2.4

  # Connectivity — used to detect slow network in player
  connectivity_plus: ^5.0.2

  # Loading indicators
  shimmer: ^3.0.0

  # Toast messages
  fluttertoast: ^8.2.4

  # File type detection
  mime: ^1.0.5

  # Path provider
  path_provider: ^2.1.2

  # Shared preferences
  shared_preferences: ^2.2.2

  # Cupertino icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
