workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - telegram_keys

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # ── 1. Inject API credentials ────────────────────────────────────────
      # Note: The manual "Download TDLib .so libraries" step has been removed.
      # The tdlib pub.dev package bundles and links native .so files
      # automatically via its own android/build.gradle — no manual copy needed.
      - name: Inject Telegram API credentials
        script: |
          sed -i "s/const int kApiId = 12345678;/const int kApiId = ${TG_API_ID};/" \
            lib/services/telegram_service.dart
          sed -i "s/const String kApiHash = 'your_api_hash_here';/const String kApiHash = '${TG_API_HASH}';/" \
            lib/services/telegram_service.dart
          echo "API credentials injected."

      # ── 2. Flutter setup ──────────────────────────────────────────────────
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos || true

      # ── 3. Build ──────────────────────────────────────────────────────────
      # Fixed: removed --debug flag from APK build (was contradicting release intent)
      - name: Build Android APK (release)
        script: |
          flutter build apk \
            --release \
            --split-per-abi \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER

      - name: Build Android App Bundle (AAB)
        script: |
          flutter build appbundle \
            --release \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
