# codemagic.yaml

workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 30

    environment:
      flutter: stable
      java: 17
      groups:
        - telegram_keys

    cache:
      cache_paths:
        - ~/.pub-cache
        - ~/.gradle/caches

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Build APK (release)
        script: |
          flutter build apk \
            --release \
            --dart-define=TG_API_ID=${TG_API_ID} \
            --dart-define=TG_API_HASH=${TG_API_HASH} \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
