workflows:
  android-release:
    name: Android Release Build
    max_build_duration: 60

    environment:
      flutter: stable
      groups:
        - telegram_keys

    triggering:
      events:
        - push
        - tag
      branch_patterns:
        - pattern: main
          include: true
          source: true

    scripts:
      # ── 1. Flutter setup ──────────────────────────────────────────────────
      # NOTE: No sed injection needed anymore.
      # API keys are passed directly at build time via --dart-define below.

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Analyze code
        script: |
          flutter analyze --no-fatal-infos || true

      # ── 2. Build ──────────────────────────────────────────────────────────
      - name: Build Android APK (release)
        script: |
          flutter build apk \
            --release \
            --split-per-abi \
            --dart-define=TG_API_ID=${TG_API_ID} \
            --dart-define=TG_API_HASH=${TG_API_HASH} \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER

      - name: Build Android App Bundle (AAB)
        script: |
          flutter build appbundle \
            --release \
            --dart-define=TG_API_ID=${TG_API_ID} \
            --dart-define=TG_API_HASH=${TG_API_HASH} \
            --build-name="1.0.0" \
            --build-number=$BUILD_NUMBER

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
